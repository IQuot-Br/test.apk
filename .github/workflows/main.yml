name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar o Cordova e criar projeto temporário
      run: |
        npm install -g cordova
        cordova create sistema_build com.meujogo.clique "Cs2"
        rm -rf sistema_build/www/*
        cp index.html sistema_build/www/
        cp jogo.js sistema_build/www/ || true

    - name: Configurar o Java do Android
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Adicionar Plataforma Android e Compilar
      run: |
        cd sistema_build
        cordova platform add android
        cordova build android --debug

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: meu-jogo-apk
        path: sistema_build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
