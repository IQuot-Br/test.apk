<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CS Mobile FPS</title>
    <!-- Bibliotecas para Gráficos e Movimento em Celular -->
    <script src="https://aframe.io"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; overflow: hidden; user-select: none; }
        /* Interface Principal (HUD) */
        #hud {
            position: absolute; top: 20px; left: 20px;
            color: #00ff00; font-family: 'Courier New', monospace; font-size: 24px;
            font-weight: bold; text-shadow: 2px 2px black; z-index: 10;
            pointer-events: none; line-height: 1.5;
        }
        /* Botão de Atirar Gigante na Direita */
        #btn-atirar {
            position: absolute; bottom: 50px; right: 50px;
            width: 90px; height: 90px; background: rgba(255, 60, 60, 0.7);
            border: 4px solid #fff; border-radius: 50%; z-index: 10;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-family: sans-serif;
        }
        #btn-atirar:active { background: rgba(255, 0, 0, 0.9); transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- HUD do Jogador -->
    <div id="hud">
        KILLS: <span id="kills">0</span><br>
        MUNIÇÃO: <span id="balas">30</span>/∞
    </div>
    
    <!-- Botão de Atirar Móvel -->
    <div id="btn-atirar">FOGO</div>

    <a-scene environment="preset: desert" joystick-controls>
        <!-- Céu e Iluminação -->
        <a-sky color="#b0e0e6"></a-sky>
        <a-light type="ambient" color="#bbb"></a-light>
        <a-light type="directional" color="#fff" intensity="0.6" position="-1 2 1"></a-light>

        <!-- Chão do Mapa -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="200" height="200" color="#333" src="https://unsplash.com"></a-plane>

        <!-- Obstáculos e Paredes Táticas (Caixas estilo CS) -->
        <a-box position="-5 1.5 -10" width="3" height="3" depth="3" color="#d2b48c"></a-box>
        <a-box position="6 1 -8" width="2" height="2" depth="2" color="#cd853f"></a-box>
        <a-box position="-10 2 -15" width="4" height="4" depth="4" color="#8b7355"></a-box>
        <a-box position="0 2 -25" width="25" height="4" depth="1" color="#555"></a-box>

        <!-- Câmera do Jogador + Arma de Fogo + Mira Crosshair -->
        
            
            <!-- Retícula/Mira Verde no Centro da Tela -->
            
            

            <!-- Modelo da Arma (Cilindro/Cubo simulando um Rifle/Pistola em 3D) -->
            
                <!-- Corpo da Arma -->
                <a-box width="0.08" height="0.12" depth="0.4" color="#1a1a1a"></a-box>
                <!-- Cano da Arma -->
                <a-cylinder radius="0.02" height="0.5" color="#333" rotation="90 0 0" position="0 0.04 -0.25"></a-cylinder>
                <!-- Flash do Tiro (Invisível por padrão) -->
                <a-sphere id="muzzle-flash" radius="0.06" color="#ffcc00" position="0 0.04 -0.55" visible="false"></a-sphere>
            
            
        

        <!-- Inimigos (Bots em formato de Alvos Militares) -->
        <a-cylinder class="inimigo" position="-5 1 -14" radius="0.4" height="2" color="#d32f2f"></a-cylinder>
        <a-cylinder class="inimigo" position="6 1 -12" radius="0.4" height="2" color="#d32f2f"></a-cylinder>
        <a-cylinder class="inimigo" position="0 1 -18" radius="0.4" height="2" color="#d32f2f"></a-cylinder>
        <a-cylinder class="inimigo" position="-12 1 -8" radius="0.4" height="2" color="#d32f2f"></a-cylinder>
    </a-scene>

    <script src="jogo.js"></script>
</body>
</html>
